<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section id="service request form">

        <h2 align="center">Service Request Form</h2>
        <form>
            <center>
                <table cellpadding="10">
                    <tr>
                        <td>Name</td>
                        <td>:</td>
                        <td><input type="text" name="name"></td>
                    </tr>
                    <tr>
                        <td>Contact Number</td>
                        <td>:</td>
                        <td><input type="tel" name="mobile"></td>
                    </tr>
                    <tr>
                        <td>Email</td>
                        <td>:</td>
                        <td><input type="email" name="email"></td>
                    </tr>
                    <tr>
                        <td>Address</td>
                        <td>:</td>
                        <td>
                            <textarea name="Address"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td>Problem Type</td>
                        <td>:</td>
                        <td>
                            <select name="problem">
                                <option value="">--Select Problem--</option>
                                <option>Data security</option>
                                <option>penitration testing</option>
                                <option>firewall setting</option>
                                <option>Managed security service</option>
                                <option>Vulnerability Management</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Describe the Problem</td>
                        <td>:</td>
                        <td>
                            <textarea name="Problem"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="3" align="center">
                            <input type="submit" value="Submit Request">
                        </td>
                    </tr>
                </table>
            </center>
        </form>
        
     </section><hr>
</body>
</html>
